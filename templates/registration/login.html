{% load static %}<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Anmeldung · FB Engineering Ticketsystem</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="https://fb-eng.de/wp-content/uploads/2024/10/FBE_green.png">
<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#eaf5e2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .box { background:#fff; padding:40px 36px; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.08); width:100%; max-width:380px; }
  .box img { display:block; margin:0 auto 18px; max-width:200px; }
  h1 { text-align:center; margin:0 0 6px; font-size:20px; color:#1f2937; }
  p.sub { text-align:center; color:#6b7280; font-size:13px; margin:0 0 24px; }
  label { display:block; font-size:12px; color:#6b7280; margin:12px 0 4px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  input { width:100%; padding:10px 12px; border:1px solid #e1e6e1; border-radius:6px; font-size:14px; box-sizing:border-box; }
  input:focus { outline:none; border-color:#92c57a; box-shadow:0 0 0 3px #eaf5e2; }
  button { width:100%; margin-top:20px; padding:11px; background:#92c57a; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer; }
  button:hover { background:#6fa959; }
  .error { background:#fecaca; color:#991b1b; padding:10px 12px; border-radius:6px; font-size:13px; margin-bottom:14px; }
</style>
</head>
<body>
  <div class="box">
    <img src="https://fb-eng.de/wp-content/uploads/2024/10/FBE_green.png" alt="FB Engineering">
    <h1>IT-Ticketsystem</h1>
    <p class="sub">Bitte mit Benutzernamen und Passwort anmelden.</p>
    {% if form.errors %}<div class="error">Benutzername oder Passwort ungültig.</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>Benutzername</label>
      <input type="text" name="username" autofocus required>
      <label>Passwort</label>
      <input type="password" name="password" required>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
